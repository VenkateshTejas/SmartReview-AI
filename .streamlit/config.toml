# SmartReview-AI — "Refined light" theme.
# Light-silver canvas, white surfaces, indigo accent, Inter type.
[theme]
base = "light"
primaryColor = "#6366F1"
backgroundColor = "#F4F6FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
